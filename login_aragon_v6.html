<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Aragón</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3f6fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#fff;
  padding:30px;
  border-radius:12px;
  width:320px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
}

.logo{
  width:140px;
  margin-bottom:20px;
}

.input-group{
  position:relative;
  width:100%;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
  box-sizing:border-box;
}

.password-input{
  padding-right:40px;
}

.eye{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  opacity:0.5;
}

.eye:hover{
  opacity:0.8;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1d4ed8;
  color:#fff;
  font-size:15px;
  cursor:pointer;
}

.msg{
  margin-top:12px;
  font-size:14px;
  color:#333;
}
</style>
</head>

<body>

<div class="card">

  <img class="logo" src="https://res.cloudinary.com/dw6e1kfyu/image/upload/v1774312301/Copia_de_Logo_Nuevo_Aragon_ehxgh7.png">

  <input id="usuario" placeholder="Usuario">

  <div class="input-group">
    <input id="contrasena" class="password-input" type="password" placeholder="Contraseña">

    <!-- icono discreto SVG -->
    <svg id="togglePass" class="eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  </div>

  <button onclick="login()">Ingresar</button>

  <div class="msg" id="msg"></div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbw5OG9c0oeDWRyuZ6SshfWZk_AZxtKftEsc5IcTf4a7qk_6Dn2KOtS2UP31xYNGc1OP/exec";

function login(){

  const usuario = document.getElementById("usuario").value;
  const contrasena = document.getElementById("contrasena").value;

  if(!usuario || !contrasena){
    document.getElementById("msg").innerHTML = "Ingresa usuario y contraseña";
    return;
  }

  window.loginCallback = function(data){

    if(data.ok){
      document.getElementById("msg").innerHTML = "Login correcto";

     data.usuario.agrupamiento = data.usuario.agrupamiento || "";
sessionStorage.setItem("usuario", JSON.stringify(data.usuario));

      setTimeout(()=>{
        window.location.href = "index.html";
      },800);

    }else{
      document.getElementById("msg").innerHTML = data.message;
    }

  };

  const script = document.createElement("script");
  script.src = URL + "?action=login&usuario=" + encodeURIComponent(usuario) + "&contrasena=" + encodeURIComponent(contrasena) + "&callback=loginCallback&_ts=" + Date.now();

  document.body.appendChild(script);

}

// comportamiento ojo mantener presionado
const togglePass = document.getElementById("togglePass");
const inputPass = document.getElementById("contrasena");

togglePass.addEventListener("mousedown", () => inputPass.type = "text");
togglePass.addEventListener("mouseup", () => inputPass.type = "password");
togglePass.addEventListener("mouseleave", () => inputPass.type = "password");

togglePass.addEventListener("touchstart", (e) => {
  e.preventDefault();
  inputPass.type = "text";
});
togglePass.addEventListener("touchend", () => inputPass.type = "password");

</script>

</body>
</html>
