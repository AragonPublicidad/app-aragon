<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aragón Publicidad | Tablero de Control</title>
  <style>
    :root {
      --azul-principal: #1695d6;
      --azul-oscuro: #0d6fa3;
      --verde-principal: #18a957;
      --verde-oscuro: #128245;
      --fondo: #f4f7fb;
      --panel: #ffffff;
      --texto: #1f2937;
      --texto-suave: #6b7280;
      --borde: #d8e2ee;
      --sombra: 0 10px 30px rgba(15, 23, 42, 0.10);
      --sidebar-ancho: 280px;
      --sidebar-colapsado: 86px;
    }

    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--fondo); color: var(--texto); overflow-x: hidden; }

    /* Layout y Sidebar */
    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: var(--sidebar-ancho);
      background: linear-gradient(180deg, #0c1725 0%, #122235 55%, #15304b 100%);
      color: #fff; padding: 18px 16px; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative; display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar.collapsed { width: var(--sidebar-colapsado); }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; overflow: hidden; }
    .brand img { width: 48px; height: 48px; background: #fff; border-radius: 12px; padding: 4px; flex-shrink: 0; }
    .brand-text { transition: opacity 0.2s; white-space: nowrap; }
    .sidebar.collapsed .brand-text, .sidebar.collapsed .menu-label { opacity: 0; pointer-events: none; }

    .menu { display: flex; flex-direction: column; gap: 8px; }
    .menu-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      color: #fff; text-decoration: none; border-radius: 12px; transition: 0.2s; cursor: pointer;
    }
    .menu-item:hover { background: rgba(255,255,255,0.08); }
    .menu-item.active { background: linear-gradient(90deg, rgba(22,149,214,0.2), rgba(24,169,87,0.2)); border: 1px solid rgba(255,255,255,0.1); }
    .menu-icon { width: 24px; text-align: center; font-size: 18px; }

    .main { flex: 1; padding: 26px; min-width: 0; }
    .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }

    /* Componentes UI */
    .card { background: var(--panel); border: 1px solid var(--borde); border-radius: 20px; box-shadow: var(--sombra); padding: 24px; margin-bottom: 20px; }
    .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .field { display: flex; flex-direction: column; gap: 8px; position: relative; }
    .field.full { grid-column: 1 / -1; }
    label { font-size: 13px; font-weight: 700; color: #475569; }

    input, select, .multiselect-trigger {
      width: 100%; padding: 12px 14px; border: 1px solid var(--borde); border-radius: 12px;
      font-size: 14px; outline: none; transition: 0.2s; background: #fff;
    }
    input:focus, select:focus { border-color: var(--azul-principal); box-shadow: 0 0 0 3px rgba(22,149,214,0.1); }

    .btn { border: none; border-radius: 12px; padding: 12px 20px; font-weight: 700; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: linear-gradient(90deg, var(--azul-principal), var(--verde-principal)); color: #fff; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(22,149,214,0.3); }
    .btn-secondary { background: #eef3f8; color: var(--texto); }

    /* Tablas */
    .table-wrap { overflow-x: auto; border-radius: 16px; border: 1px solid var(--borde); background: #fff; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f8fafc; color: #64748b; padding: 14px; text-align: left; border-bottom: 1px solid var(--borde); }
    td { padding: 14px; border-bottom: 1px solid #f1f5f9; }

    /* Modales */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
    }
    .modal-backdrop.open { display: flex; }
    .modal { background: #fff; border-radius: 20px; width: 100%; max-width: 750px; max-height: 90vh; overflow-y: auto; padding: 24px; position: relative; }

    /* Autocomplete y Multiselect */
    .suggestions {
      position: absolute; top: 100%; left: 0; right: 0; background: #fff;
      border: 1px solid var(--borde); border-radius: 12px; box-shadow: var(--sombra);
      z-index: 100; max-height: 200px; overflow-y: auto; display: none;
    }
    .suggestions.open { display: block; }
    .suggestion-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
    .suggestion-item:hover { background: #f1f5f9; color: var(--azul-principal); }

    /* Especiales para Producción */
    .info-cell { background: #f8fafc; padding: 10px; border-radius: 10px; border: 1px solid var(--borde); }
    .info-cell span { display: block; font-size: 10px; color: var(--texto-suave); margin-bottom: 4px; }
    .info-cell strong { font-size: 13px; }

    .dropzone { border: 2px dashed var(--borde); padding: 30px; border-radius: 16px; text-align: center; cursor: pointer; transition: 0.2s; }
    .dropzone:hover { border-color: var(--azul-principal); background: rgba(22,149,214,0.02); }

    .vista-oculta { display: none !important; }
  </style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <img src="https://res.cloudinary.com/dpl97v9as/image/upload/v1738101484/logo_arag%C3%B3n_cuadrado.png" alt="Aragón">
      <div class="brand-text">
        <h1 style="margin:0; font-size:16px;">Aragón Publicidad</h1>
        <p style="margin:0; font-size:11px; opacity:0.8;">Tablero de Gestión</p>
      </div>
    </div>

    <nav class="menu">
      <div class="menu-item active" onclick="showView('produccion', this)">
        <span class="menu-icon">🏭</span> <span class="menu-label">Producción</span>
      </div>
      <div class="menu-item" onclick="showView('usuarios', this)">
        <span class="menu-icon">👥</span> <span class="menu-label">Usuarios</span>
      </div>
    </nav>
  </aside>

  <main class="main">
    <header class="top-header">
      <div style="display:flex; align-items:center; gap:15px;">
        <button onclick="document.getElementById('sidebar').classList.toggle('collapsed')" class="btn btn-secondary">☰</button>
        <h2 id="viewTitle" style="margin:0;">Módulo de Producción</h2>
      </div>
    </header>

    <section id="vistaProduccion" class="vista-modulo">
      <div class="card">
        <div class="grid-form">
          <div class="field">
            <label>Buscar Folio / Cliente</label>
            <input type="text" id="folioSelect" placeholder="Escribe folio o nombre..." autocomplete="off">
            <div id="folioSuggestions" class="suggestions"></div>
          </div>
          <div class="field">
            <label>Filtrar en tabla</label>
            <input type="text" id="filtroGeneral" placeholder="Filtra por IDRG o Producto...">
          </div>
        </div>
      </div>

      <div class="table-wrap">
        <table id="tablaProduccion">
          <thead>
            <tr>
              <th>Acción</th>
              <th>Folio</th>
              <th>IDRG / Producto</th>
              <th>Medidas</th>
              <th>Piezas</th>
              <th>Sucursal Entrega</th>
            </tr>
          </thead>
          <tbody id="itemsBody">
            <tr><td colspan="6" style="text-align:center; padding:40px; color:var(--texto-suave);">Carga un folio para ver los trabajos</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section id="vistaUsuarios" class="vista-modulo vista-oculta">
      <div class="card">
        <form id="usuarioForm" class="grid-form">
          <div class="field"><label>Nombre Completo</label><input type="text" id="nombre" required></div>
          <div class="field"><label>Email / Usuario</label><input type="text" id="usuario" required></div>
          <div class="field"><label>Contraseña</label><input type="password" id="password" required></div>
          <div class="field">
             <label>Tipo de Usuario</label>
             <select id="tipoUsuario"><option value="Administrador">Administrador</option><option value="Operativo">Operativo</option></select>
          </div>
          <div class="actions">
            <button type="submit" class="btn btn-primary" id="btnGuardarUsuario">Guardar Usuario</button>
          </div>
        </form>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nombre</th><th>Usuario</th><th>Tipo</th><th>Acciones</th></tr></thead>
          <tbody id="tablaUsuariosBody"></tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<div id="uploadModal" class="modal-backdrop">
  <div class="modal">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <h3 style="margin:0;">Enviar a Producción</h3>
      <button class="btn btn-secondary" onclick="closeModal()">✕</button>
    </div>
    
    <div id="itemResume" class="grid-form" style="background:#f8fafc; padding:15px; border-radius:15px; margin-bottom:20px; grid-template-columns: repeat(3, 1fr);">
      </div>

    <div class="field" style="margin-bottom:20px;">
      <label>Tipo Impresión / Maquila</label>
      <select id="tipoImpresion">
        <option value="">Selecciona una opción...</option>
        <option value="IMPRESION">IMPRESION</option>
        <option value="MAQUILA">MAQUILA</option>
      </select>
    </div>

    <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
      <strong>Haz clic o arrastra archivos</strong>
      <p style="font-size:12px; margin:5px 0;">Sube el diseño para producción</p>
      <input type="file" id="fileInput" multiple style="display:none;">
    </div>
    <ul id="fileList" style="margin-top:15px; padding:0; list-style:none;"></ul>

    <div style="margin-top:25px; text-align:right;">
      <button class="btn btn-primary" id="btnSubir" onclick="iniciarCargaReal()">Iniciar Subida a Drive</button>
    </div>
  </div>
</div>

<script>
  // ==========================================
  // CONFIGURACIÓN (REEMPLAZA CON TUS DATOS)
  // ==========================================
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw5OG9c0oeDWRyuZ6SshfWZk_AZxtKftEsc5IcTf4a7qk_6Dn2KOtS2UP31xYNGc1OP/exec"; 
  const DRIVE_UPLOAD_FOLDER_ID = "1ahtRm1WWqkSNb4Gi9bqHOzRtPR-gaq5Q";

  let state = {
    produccion: [],
    usuarios: [],
    selectedItem: null,
    files: []
  };

  // ==========================================
  // COMUNICACIÓN JSONP (EL CORAZÓN)
  // ==========================================
  function ejecutarAccion(action, params, callback) {
    const cbName = "cb_" + Math.floor(Math.random() * 1000000);
    window[cbName] = (res) => {
      callback(res);
      delete window[cbName];
      document.getElementById(cbName)?.remove();
    };

    let url = `${WEB_APP_URL}?action=${action}&callback=${cbName}`;
    if (params) {
      for (let key in params) url += `&${key}=${encodeURIComponent(params[key])}`;
    }

    const script = document.createElement("script");
    script.id = cbName;
    script.src = url;
    document.body.appendChild(script);
  }

  // ==========================================
  // NAVEGACIÓN
  // ==========================================
  function showView(viewId, el) {
    document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.vista-modulo').forEach(v => v.classList.add('vista-oculta'));
    document.getElementById('vista' + viewId.charAt(0).toUpperCase() + viewId.slice(1)).classList.remove('vista-oculta');
    document.getElementById('viewTitle').textContent = "Módulo de " + viewId.charAt(0).toUpperCase() + viewId.slice(1);
  }

  // ==========================================
  // MÓDULO PRODUCCIÓN
  // ==========================================
  const folioInput = document.getElementById('folioSelect');
  const folioSuggestions = document.getElementById('folioSuggestions');

  folioInput.oninput = (e) => {
    const query = e.target.value;
    if (query.length < 2) { folioSuggestions.classList.remove('open'); return; }
    
    ejecutarAccion("getFoliosProduccion", { q: query }, (data) => {
      folioSuggestions.innerHTML = "";
      if (data && data.length) {
        data.forEach(folio => {
          const div = document.createElement('div');
          div.className = 'suggestion-item';
          div.textContent = folio;
          div.onclick = () => selectFolio(folio);
          folioSuggestions.appendChild(div);
        });
        folioSuggestions.classList.add('open');
      }
    });
  };

  function selectFolio(folio) {
    folioInput.value = folio;
    folioSuggestions.classList.remove('open');
    cargarItemsFolio(folio);
  }

  function cargarItemsFolio(folio) {
    document.getElementById('itemsBody').innerHTML = '<tr><td colspan="6" style="text-align:center;">Buscando trabajos...</td></tr>';
    ejecutarAccion("getItemsByFolio", { folio: folio }, (items) => {
      state.produccion = items;
      renderTable(items);
    });
  }

  function renderTable(items) {
    const body = document.getElementById('itemsBody');
    body.innerHTML = items.map((item, index) => `
      <tr>
        <td><button class="btn btn-primary" style="padding:6px 10px; font-size:11px;" onclick="openUploadModal(${index})">SUBIR</button></td>
        <td><strong>${item.FOLIO}</strong></td>
        <td>${item.IDRG || 'N/A'} - ${item.PRODUCTO}</td>
        <td>${item.MEDIDA_ANCHO}x${item.MEDIDA_ALTO}</td>
        <td>${item.PIEZAS}</td>
        <td>
          <select onchange="updateSucursal(${index}, this.value)">
            <option value="XALAPA" ${item.SUCURSAL_ENTREGA === 'XALAPA' ? 'selected' : ''}>XALAPA</option>
            <option value="VERACRUZ" ${item.SUCURSAL_ENTREGA === 'VERACRUZ' ? 'selected' : ''}>VERACRUZ</option>
          </select>
        </td>
      </tr>
    `).join('');
  }

  // ==========================================
  // SUBIDA A DRIVE (LOGICA RESUMABLE)
  // ==========================================
  function openUploadModal(index) {
    state.selectedItem = state.produccion[index];
    const resume = document.getElementById('itemResume');
    resume.innerHTML = `
      <div class="info-cell"><span>Folio</span><strong>${state.selectedItem.FOLIO}</strong></div>
      <div class="info-cell"><span>Producto</span><strong>${state.selectedItem.PRODUCTO}</strong></div>
      <div class="info-cell"><span>Medidas</span><strong>${state.selectedItem.MEDIDA_ANCHO}x${state.selectedItem.MEDIDA_ALTO}</strong></div>
    `;
    document.getElementById('uploadModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('uploadModal').classList.remove('open');
    state.files = [];
    document.getElementById('fileList').innerHTML = '';
  }

  document.getElementById('fileInput').onchange = (e) => {
    state.files = Array.from(e.target.files);
    document.getElementById('fileList').innerHTML = state.files.map(f => `<li style="font-size:12px; margin-top:5px;">📄 ${f.name} (${(f.size/1024/1024).toFixed(2)} MB)</li>`).join('');
  };

  async function iniciarCargaReal() {
    if(!state.files.length) return alert("Selecciona archivos");
    if(!document.getElementById('tipoImpresion').value) return alert("Selecciona tipo de impresión");

    const btn = document.getElementById('btnSubir');
    btn.disabled = true;
    btn.textContent = "Subiendo...";

    try {
      // Aquí se conecta con tu función original subirArchivosDirectoDrive_
      // Se asume que manejas el token de Google desde el backend o via gapi.
      alert("Iniciando proceso de subida pesada a Drive...");
      // Simulación de éxito por ahora:
      setTimeout(() => {
        alert("¡Archivos subidos y registro actualizado!");
        closeModal();
        btn.disabled = false;
        btn.textContent = "Iniciar Subida a Drive";
      }, 2000);
    } catch (err) {
      alert("Error: " + err.message);
      btn.disabled = false;
    }
  }

  window.onload = () => {
